<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso · Inventario</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .login-card {
            background: white;
            width: 100%;
            max-width: 360px;
            padding: 32px 24px;
            border-radius: 32px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.1);
            text-align: center;
        }

        .login-icon {
            font-size: 3.2rem;
            margin-bottom: 8px;
        }

        h2 {
            color: #0f172a;
            font-size: 1.6rem;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 28px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #334155;
            margin-bottom: 6px;
            margin-left: 4px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 24px;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }

        .input-group input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }

        .login-btn {
            width: 100%;
            background: #0f172a;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 12px;
        }

        .login-btn:active {
            transform: scale(0.97);
            background: #1e293b;
        }

        .error-message {
            color: #dc2626;
            font-size: 0.9rem;
            margin-top: 16px;
            min-height: 24px;
        }

        .footer {
            margin-top: 24px;
            font-size: 0.8rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-icon">🔐</div>
    <h2>Acceso privado</h2>
    <div class="subtitle">Ingresa tus credenciales</div>

    <form id="loginForm" onsubmit="validarLogin(event)">
        <div class="input-group">
            <label>Usuario</label>
            <input type="text" id="username" placeholder="admin" autocomplete="off">
        </div>
        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button type="submit" class="login-btn">Entrar al inventario</button>
        <div class="error-message" id="errorMsg"></div>
    </form>

    <div class="footer">Inventario · versión 1.0</div>
</div>

<script>
    // Usuario y contraseña fijos
    const USUARIO_CORRECTO = "admin";
    const CONTRASENA_CORRECTA = "Alevf26$";

    function validarLogin(event) {
        event.preventDefault();

        const usuario = document.getElementById('username').value;
        const contrasena = document.getElementById('password').value;
        const errorMsg = document.getElementById('errorMsg');

        if (usuario === USUARIO_CORRECTO && contrasena === CONTRASENA_CORRECTA) {
            // ✅ GUARDAR MARCA DE SESIÓN
            sessionStorage.setItem('sesionActiva', 'true');
            window.location.href = 'inventario.html';
        } else {
            errorMsg.textContent = "❌ Usuario o contraseña incorrectos";
            document.getElementById('password').value = "";
        }
    }
</script>

</body>
</html>
